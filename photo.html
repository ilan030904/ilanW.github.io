<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photos</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .photo-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .photo-note {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body style="margin:0; padding:0;">

<header>
  <div class="header-left">Personal Portfolio</div>
  <div class="header-center">Ambitious | Strategic | Problem Solver</div>
  <div class="header-right">Ilan Weiner | Marketing Student</div>
</header>

<main style="padding: 20px; max-width: 900px; margin: auto;">
  
  <center>
    <h1 style="text-align: center; margin-bottom: 10px; border-bottom: 3px solid #e35d02; display: inline-block; padding-bottom: 10px; letter-spacing: 5px;">
      My Photos
    </h1>
  </center>

  <p class="photo-note">
    All these photos are taken with a Nikon with some minor editing. Enjoy!
  </p>

  <div class="photo-grid">
    <img src="https://via.placeholder.com/300" alt="photo1">
    <img src="https://via.placeholder.com/300" alt="photo2">
    <img src="https://via.placeholder.com/300" alt="photo3">
    <img src="https://via.placeholder.com/300" alt="photo4">
    <img src="https://via.placeholder.com/300" alt="photo5">
    <img src="https://via.placeholder.com/300" alt="photo6">
    <img src="https://via.placeholder.com/300" alt="photo7">
    <img src="https://via.placeholder.com/300" alt="photo8">
    <img src="https://via.placeholder.com/300" alt="photo9">
  </div>

</main>

</body>
</html>
