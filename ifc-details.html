<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC - VP of Communications</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-left">Personal Portfolio</div>
  <div class="header-center">Ambitious | Strategic | Problem Solver</div>
  <div class="header-right">Ilan Weiner | Marketing Student</div>
</header>

<section class="hero-carousel">
  <!-- Carousel images wrapper -->
  <div class="hero-carousel-images-wrapper">
    <!-- Left side vertical text -->
    <div class="hero-left-text">
      Interfraternity Council<br>
      VP of Communications
    </div>

    <!-- Carousel images in center -->
    <div class="hero-carousel-images">
      <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/6f0f9eaa6d434a60f7d180259c1cdec30731d873/IFC%20chronicle.png" alt="IFC Chronicle 1" class="active">
      <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/6f0f9eaa6d434a60f7d180259c1cdec30731d873/IFC%20Chronicle%202.png" alt="IFC Chronicle 2">
      <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/fcdbf743e31b2852b2f15f291c5f65a54c8eb163/what%20is%20IFC%201.png" alt="What is IFC 1">
      <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/6f0f9eaa6d434a60f7d180259c1cdec30731d873/fianls%20graphic.png" alt="Final Graphic">
    </div>
  </div>

  <!-- Right side vertical text -->
  <div class="hero-right-text">
    2025 - 2026
  </div>

  <!-- Carousel dots -->
  <div class="carousel-dots">
    <span class="active"></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</section>

<section class="favorites">
  <div class="favorite-card">
    <img src="https://via.placeholder.com/300x200?text=Favorite+1" alt="Favorite 1">
    <p>Description for favorite image 1.</p>
  </div>
  <div class="favorite-card">
    <img src="https://via.placeholder.com/300x200?text=Favorite+2" alt="Favorite 2">
    <p>Description for favorite image 2.</p>
  </div>
  <div class="favorite-card">
    <img src="https://via.placeholder.com/300x200?text=Favorite+3" alt="Favorite 3">
    <p>Description for favorite image 3.</p>
  </div>
</section>

<footer>
  <p>Connect with me on <a href="https://www.linkedin.com/in/ilan-weiner" style="color:white;">LinkedIn</a></p>
</footer>

<script>
const images = document.querySelectorAll(".hero-carousel-images img");
const dots = document.querySelectorAll(".carousel-dots span");
let currentIndex = 0;

// Show image and active dot
function showImage(index) {
  images.forEach((img, i) => img.classList.toggle("active", i === index));
  dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
  currentIndex = index;
}

// Automatic rotation every 4 seconds
setInterval(() => {
  let nextIndex = (currentIndex + 1) % images.length;
  showImage(nextIndex);
}, 4000);

// Clickable dots
dots.forEach((dot, i) => dot.addEventListener("click", () => showImage(i)));
</script>

</body>
</html>
