<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC - VP of Communications</title>
  <link rel="stylesheet" href="css/style.css">  
  <style>
    /* Header ribbon - same as main page */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #e35d02; /* orange ribbon */
      color: #fff;
      padding: 0.3rem 1rem;
      font-family: Arial, sans-serif;
      font-size: 0.85rem; 
      line-height: 1;
      width: 100%;
      box-sizing: border-box;
    }
    .header-left, .header-right, .header-center {
      margin: 0;
      padding: 0;
      white-space: nowrap;
    }

    /* Hero Carousel Section */
    .hero-carousel {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 625px; /* slightly taller to fit vertical images */
      background-color: #FFC857; /* placeholder color */
    }
    .hero-carousel img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* fit entire image, keep aspect ratio */
      flex-shrink: 0;
      transition: opacity 1s ease-in-out;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }
    .hero-carousel img.active {
      opacity: 1;
      position: relative;
    }

    /* Hero text overlay - LEFT aligned */
    .hero-text-overlay {
      position: absolute;
      top: 5%;
      left: 5%;
      transform: none;
      color: #fff;
      text-align: left;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      max-width: 600px;
      z-index: 10;
    }
    .hero-text-overlay h1 {
      font-size: 3rem;
      margin: 0;
    }
    .hero-text-overlay p {
      font-size: 1.5rem;
      font-style: italic;
      margin: 0.5rem 0 0 0;
    }

    /* Carousel dots */
    .carousel-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .carousel-dots span {
      display: block;
      width: 12px;
      height: 12px;
      background-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      cursor: pointer;
    }
    .carousel-dots .active {
      background-color: #fff;
    }

    /* Favorites section below hero */
    .favorites {
      background-color: #F5F5DC; /* beige */
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      padding: 2rem;
      gap: 2rem;
    }
    .favorite-card {
      text-align: center;
      max-width: 300px;
    }
    .favorite-card img {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }
    .favorite-card p {
      margin-top: 0.5rem;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      background-color: #e35d02;
      color: #fff;
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      .hero-text-overlay h1 {
        font-size: 2rem;
      }
      .hero-text-overlay p {
        font-size: 1.2rem;
      }
      .hero-carousel {
        height: 400px;
      }
      .favorites {
        flex-direction: column;
        align-items: center;
      }
      .carousel-dots span {
        width: 10px;
        height: 10px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">Personal Portfolio</div>
  <div class="header-center">Ambitious | Strategic | Problem Solver</div>
  <div class="header-right">Ilan Weiner | Marketing Student</div>
</header>

<section class="hero-carousel">
  <!-- Left side text -->
  <div class="hero-side-text hero-left-text">
    Interfraternity Council<br>
    VP of Communications
  </div>

  <!-- Center carousel images -->
  <div class="hero-carousel-images">
    <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/6f0f9eaa6d434a60f7d180259c1cdec30731d873/IFC%20chronicle.png" alt="IFC Chronicle 1" class="active">
    <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/6f0f9eaa6d434a60f7d180259c1cdec30731d873/IFC%20Chronicle%202.png" alt="IFC Chronicle 2">
    <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/fcdbf743e31b2852b2f15f291c5f65a54c8eb163/what%20is%20IFC%201.png" alt="What is IFC 1">
    <img src="https://raw.githubusercontent.com/ilan030904/ilanW.github.io/6f0f9eaa6d434a60f7d180259c1cdec30731d873/fianls%20graphic.png" alt="Final Graphic">
  </div>

  <!-- Right side text -->
  <div class="hero-side-text hero-right-text">
    2025 - 2026
  </div>

  <!-- Carousel dots -->
  <div class="carousel-dots">
    <span class="active"></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</section>

<!-- Favorites Section -->
<section class="favorites">
  <div class="favorite-card">
    <img src="https://via.placeholder.com/300x200?text=Favorite+1" alt="Favorite 1">
    <p>Description for favorite image 1.</p>
  </div>
  <div class="favorite-card">
    <img src="https://via.placeholder.com/300x200?text=Favorite+2" alt="Favorite 2">
    <p>Description for favorite image 2.</p>
  </div>
  <div class="favorite-card">
    <img src="https://via.placeholder.com/300x200?text=Favorite+3" alt="Favorite 3">
    <p>Description for favorite image 3.</p>
  </div>
</section>

<footer>
  <p>Connect with me on <a href="https://www.linkedin.com/in/ilan-weiner" style="color:white;">LinkedIn</a></p>
</footer>

<script>
  // Carousel auto-slide
  const slides = document.querySelectorAll('.hero-carousel img');
  const dots = document.querySelectorAll('.carousel-dots span');
  let currentIndex = 0;

  function showSlide(index) {
    slides.forEach((slide, i) => {
      slide.classList.toggle('active', i === index);
      dots[i].classList.toggle('active', i === index);
    });
  }

  setInterval(() => {
    currentIndex = (currentIndex + 1) % slides.length;
    showSlide(currentIndex);
  }, 10000); // change every 10 seconds
</script>

</body>
</html>
